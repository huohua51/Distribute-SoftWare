server:
  port: 8084

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: seckill_route
          uri: lb://seckill-seckill-service
          predicates:
            - Path=/api/seckill/**
        - id: payment_route
          uri: lb://seckill-payment-service
          predicates:
            - Path=/api/payment/**
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:localhost:8858}
      eager: true

app:
  runtime:
    message: gateway local runtime message
  limit:
    gateway-route-qps: ${GATEWAY_ROUTE_QPS:25}

management:
  endpoints:
    web:
      exposure:
        include: health,info,sentinel
