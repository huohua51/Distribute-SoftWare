services:
  redis:
    image: redis:7-alpine
    container_name: hc-redis
    ports:
      - "6379:6379"

  mysql-master:
    image: mysql:8.0
    container_name: hc-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/master/my.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql-master-data:/var/lib/mysql

  mysql-slave:
    image: mysql:8.0
    container_name: hc-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/slave/my.cnf:/etc/mysql/conf.d/slave.cnf:ro
      - mysql-slave-data:/var/lib/mysql
    depends_on:
      - mysql-master

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: hc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"

  backend1:
    build:
      context: ./backend
    container_name: hc-backend-1
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-1
      REDIS_URL: redis://redis:6379
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: shop
      ES_HOST: http://elasticsearch:9200
    depends_on:
      - redis
      - mysql-master
      - mysql-slave
      - elasticsearch
    ports:
      - "8081:3000"

  backend2:
    build:
      context: ./backend
    container_name: hc-backend-2
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-2
      REDIS_URL: redis://redis:6379
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: shop
      ES_HOST: http://elasticsearch:9200
    depends_on:
      - redis
      - mysql-master
      - mysql-slave
      - elasticsearch
    ports:
      - "8082:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hc-nginx
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro

volumes:
  mysql-master-data:
  mysql-slave-data:
