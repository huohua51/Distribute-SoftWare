services:
  redis:
    image: redis:7-alpine
    container_name: hc-redis
    ports:
      - "6379:6379"

  backend1:
    build:
      context: ./backend
    container_name: hc-backend-1
    environment:j'x
      PORT: 3000
      INSTANCE_NAME: backend-1
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "8081:3000"

  backend2:
    build:
      context: ./backend
    container_name: hc-backend-2
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-2
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "8082:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hc-nginx
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
