spring:
  application:
    name: seckill-inventory-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:common-infra.yaml?group=${NACOS_GROUP:HOMEWORK5_GROUP}
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:HOMEWORK5_GROUP}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        group: ${NACOS_GROUP:HOMEWORK5_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        group: ${NACOS_GROUP:HOMEWORK5_GROUP}
        file-extension: yaml
        refresh-enabled: true
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
